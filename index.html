<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="FlowState — Premium Pomodoro Timer for Deep Work" />
  <title>FlowState — Deep Work Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="cyber" data-phase="focus">

  <!-- Ambient background -->
  <div class="bg-canvas">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="noise-overlay"></div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- ===== MAIN APP ===== -->
  <div class="app-shell" id="appShell">
    <main class="main-content">

      <!-- TIMER VIEW -->
      <section class="view active" id="view-timer">
        <div class="timer-layout">

          <!-- Phase tabs -->
          <div class="phase-tabs">
            <button class="phase-tab active" data-phase="focus">Focus</button>
            <button class="phase-tab" data-phase="short">Short Break</button>
            <button class="phase-tab" data-phase="long">Long Break</button>
          </div>

          <!-- Timer ring -->
          <div class="timer-wrapper">
            <svg class="progress-ring" viewBox="0 0 360 360" id="progressRing">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--accent-a)" />
                  <stop offset="100%" stop-color="var(--accent-b)" />
                </linearGradient>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
                  <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              <!-- Track -->
              <circle class="ring-track" cx="180" cy="180" r="160" fill="none" stroke-width="6"/>
              <!-- Progress -->
              <circle class="ring-progress" id="ringProgress" cx="180" cy="180" r="160"
                fill="none" stroke="url(#ringGrad)" stroke-width="6"
                stroke-linecap="round"
                stroke-dasharray="1005.31"
                stroke-dashoffset="0"
                filter="url(#glow)"
                transform="rotate(-90 180 180)"/>
              <!-- Tick marks -->
              <g class="tick-marks" id="tickMarks"></g>
            </svg>

            <!-- Inner content -->
            <div class="timer-inner">
              <div class="timer-display" id="timerDisplay">25:00</div>
              <div class="phase-label" id="phaseLabel">Focus Time</div>
              <div class="session-dots" id="sessionDots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
              </div>
            </div>
          </div>

          <!-- Controls -->
          <div class="timer-controls">
            <button class="ctrl-btn secondary" id="resetBtn" title="Reset (R)">
              <svg viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="ctrl-btn primary" id="startBtn" title="Start/Pause (Space)">
              <span id="startBtnIcon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </span>
              <span id="startBtnText">Start</span>
            </button>
            <button class="ctrl-btn secondary" id="skipBtn" title="Skip">
              <svg viewBox="0 0 24 24" fill="none"><path d="M5 4l10 8-10 8V4zM19 5v14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- FOCUS MODE OVERLAY -->
  <div class="focus-overlay" id="focusOverlay">
    <div class="focus-bg-anim">
      <div class="focus-orb fo1"></div>
      <div class="focus-orb fo2"></div>
    </div>
    <button class="focus-exit" id="focusExitBtn">
      <svg viewBox="0 0 24 24" fill="none" width="20"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Exit Focus
    </button>
    <div class="focus-content">
      <div class="focus-timer" id="focusTimerDisplay">25:00</div>
      <div class="focus-phase" id="focusPhaseLabel">Focus Time</div>
      <div class="focus-controls">
        <button class="focus-ctrl" id="focusStartBtn">▶</button>
      </div>
    </div>
  </div>

  <!-- NOTIFICATION FALLBACK -->
  <div class="in-app-alert" id="inAppAlert">
    <span id="inAppAlertText"></span>
    <button onclick="document.getElementById('inAppAlert').classList.remove('visible')">✕</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
